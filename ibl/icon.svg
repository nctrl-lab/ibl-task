<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="env" cx="50%" cy="50%" r="48%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="55%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <mask id="gauss">
      <rect width="64" height="64" fill="url(#env)"/>
    </mask>
    <pattern id="grating" width="16" height="64" patternUnits="userSpaceOnUse">
      <rect width="8" height="64" fill="#ffffff"/>
      <rect x="8" width="8" height="64" fill="#000000"/>
    </pattern>
  </defs>
  <rect width="64" height="64" fill="#808080"/>
  <rect width="64" height="64" fill="url(#grating)" mask="url(#gauss)"/>
</svg>
